<html>
    <head>
        <title>HTML CSS JS</title>
        <style>
            *{
                padding: 0px;
                margin: 0px;
            }
            .contenedor{
                width: 900px;
                height: 500px;
                border: 1px solid black;
                margin: 0 auto;
                position: relative;
                overflow: hidden;
            }/* hasta aqui preparar para todas las clases */
            .tr1, .tr2, .tr3{
                width: 300px;
                height: 500px;
                left: -300px;
                position: absolute;
                background-size: cover;
            }
            .tr1{
                
                background-image: url(img/html.jpg);
                animation: tr1 3s 1 forwards 3s;
            }
            .tr2{
                background-image: url(img/css.jpg);
                animation: tr2 3s 1 forwards 6s;
            }
            .tr3{
                background-image: url(img/js.jpg);
                animation: tr3 3s 1 forwards 9s;
            }
            @keyframes tr1 {
                0%{
                    left: -300px;
                }
                100%{
                    left: 0px;
                }
            }
            @keyframes tr2 {
                0%{
                    left: -300px;
                }
                100%{
                    left: 300px;
                }
            
            }
            @keyframes tr3 {
                0%{
                    left: -300px;
                }
                100%{
                    left: 600px;
                }
            }
            .tr1:hover{
                transition: 1s;
                scale: 1.2;
                z-index: 1;
            }
            .tr2:hover{
                transition: 1s;
                scale: 1.2;
                z-index: 1;
            }
            .tr3:hover{
                transition: 1s;
                scale: 1.2;
                z-index: 1;
            }
            .texto{
                width: 300px;
                height: 50px;
                top: -500px;
                font-size: 40px;
                font-weight: bold;
                padding-top: 20px;
                padding-bottom: 20px;
                position: relative;
                background-color: rgb(0, 0, 0);
                animation: texto 3s 1 forwards 12s;
                text-align: center;
                color: blanchedalmond;
                z-index: 0;
            }
            @keyframes texto {
                0%{
                    top: -500px;
                    transform: rotateY(180deg);
                }
                100%{
                    top: 370px;
                }
            }
            .texto:hover{
                transition: 1s;
                scale: 1;
                color: white;
                background-color: rgb(0, 0, 0);
            }
            .tr1 .texto:hover{
                color: orangered;
            }
            .tr2 .texto:hover{
                color: rgb(5, 184, 255);
            }
            .tr3 .texto:hover{
                color: yellow;
            }
        </style>
    </head>
    <body>
        <div class="contenedor">
            <div class="tr1">
                <div class="texto">HTML 5</div>
            </div>
            <div class="tr2">
                <div class="texto">CSS 3</div>
            </div>
            <div class="tr3">
                <div class="texto">JAVASCRIPT</div>
            </div>
            
        </div>
    </body>
</html>
